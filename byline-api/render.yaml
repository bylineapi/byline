# render.yaml - Configuración de despliegue en Render

services:
  - type: web
    name: byline-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: news-db
          property: connectionString
      - key: ADMIN_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: news-db
    plan: free
    databaseName: newsdb
    ipAllowList: []
