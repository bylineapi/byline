# render.yaml - Configuración de despliegue en Render (usa Neon externo)

services:
  - type: web
    name: byline-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn byline-api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
